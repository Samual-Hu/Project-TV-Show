<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TV Show Project | Xuanming Hu (Samual-Hu)</title>
		<link href="style.css" rel="stylesheet" />
		<link rel="icon" href="/favicon.ico" type="image/x-icon" />
	</head>

	<body>
		<div id="root">
			<header>
				<form action="">
					<label for="show-selector">Jump to episode</label>
					<select id="show-selector">
						<option value="">Select a Show</option>
					</select>
				</form>
			</header>
			<main id="main">
				<form id="controls">
					<label for="episode-selector">Jump to episode</label>
					<select id="episode-selector">
						<option value="">Select an episode</option>
					</select>
					<label for="search-input">Search Episodes</label>
					<input
						type="search"
						id="search-input"
						placeholder="Type here..."
					/>
					<p id="episode-count"></p>
				</form>
				<section id="episode-list"></section>
			</main>
			<footer>
				<p class="tvmaze-attribution">
					Data originally provided by
					<a href="https://www.tvmaze.com/" target="_blank"
						>TVMaze.com</a
					>
				</p>
			</footer>
		</div>

		<!-- Loads YOUR javascript code -->
		<script src="script.js"></script>
	</body>
</html>
