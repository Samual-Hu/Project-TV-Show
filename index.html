<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Xuanming Hu (Samual-Hu)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <div id="root">
      <main id="main">
        <section id="shows-listing-view">
          <div class="search-wrapper">
            <label for="show-search-input">Search Shows:</label>
            <input
              type="search"
              id="show-search-input"
              placeholder="Search shows by name, genre, or summary..."
            />
            <button
              type="button"
              id="clear-show-search"
              aria-label="Clear show search input"
            >
              ×
            </button>
          </div>
          <p id="show-count" aria-live="polite"></p>
          <section id="shows-grid" class="grid-container"></section>
        </section>

        <section id="episodes-view" style="display: none">
          <form id="controls">
            <button type="button" id="back-to-shows-btn">
              ← Back to Shows
            </button>

            <label for="show-selector">Jump to Episode</label>
            <select id="show-selector">
              <option value="">Select a Show</option>
            </select>
            <select id="episode-selector">
              <option value="">Select an episode</option>
            </select>
            <div class="search-wrapper">
              <label for="search-input">Search Episodes</label>
              <input
                type="search"
                id="search-input"
                placeholder="Type here..."
              />
              <p id="episode-count"></p>
            </div>
          </form>
          <section id="episode-list" class="grid-container"></section>
        </section>
      </main>
      <footer>
        <p class="tvmaze-attribution">
          Data originally provided by
          <a href="https://www.tvmaze.com/" target="_blank">TVMaze.com</a>
        </p>
      </footer>
    </div>

    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>
  </body>
</html>
